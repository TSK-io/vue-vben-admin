services:
  postgres:
    image: postgres:16-alpine
    container_name: guard-silver-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: guard_silver
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d guard_silver']
      interval: 10s
      timeout: 5s
      retries: 5

  backend-fastapi:
    build:
      context: ./apps/backend-fastapi
    container_name: guard-silver-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_DEBUG: 'false'
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/guard_silver
      APP_ALLOWED_ORIGINS: '["http://localhost:5666","http://localhost:4173","http://localhost:3000","http://localhost:8000"]'
      APP_JWT_SECRET: change-this-secret-at-least-32-chars
      APP_MAX_CONCURRENT_REQUESTS: 64
      APP_REQUEST_QUEUE_TIMEOUT_MS: 2500
      APP_SLOW_REQUEST_THRESHOLD_MS: 1000
    ports:
      - '8000:8000'
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:8000/api/v1/health/ready || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  adminer:
    image: adminer:4-standalone
    container_name: guard-silver-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '18080:8080'

volumes:
  postgres-data:
